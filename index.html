<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMED Ablauf Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="topbar">
    <a class="navlink" href="stats.html">Statistik öffnen</a>
  </div>

  <div class="toolbar">
    <select id="category" onchange="applyFilters()"></select>
    <input id="search" type="text" placeholder="Suche..." oninput="applyFilters()">
  </div>

  <main class="card front" id="card" onclick="flipCard()">
    <div class="card-meta" id="cardMeta"></div>
    <div class="card-progress" id="cardProgress"></div>
    <div class="step-label" id="step"></div>
    <div class="ablauf-context" id="ablaufContext"></div>

    <div class="card-grid">
      <div class="card-half card-question">
        <div class="term question-text" id="questionText"></div>
      </div>
      <div class="card-divider"></div>
      <div class="card-half card-answer">
        <div class="term answer-text" id="answerText"></div>
      </div>
    </div>
  </main>

  <div class="controls">
    <div class="controls-row controls-row-nav">
      <button class="nav-button" onclick="previousCard()">← Zurück</button>
      <button class="nav-button" onclick="nextCard()">Weiter →</button>
    </div>
    <div class="controls-row controls-row-grade">
      <button class="again-button" onclick="markAgain()">↑ Wiederholen</button>
      <button class="good-button" onclick="markGood()">↓ Gewusst</button>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="excel-loader.js"></script>
<script src="app.js"></script>

</body>
</html>
