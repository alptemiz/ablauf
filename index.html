<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAMED Ablauf Flashcards</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <header>
    <h1>FAMED Ablauf Flashcards</h1>
    <p>Nominalstil → Patientensprache</p>
    <a class="navlink" href="stats.html">Statistik öffnen</a>
  </header>

  <div class="source-row">
    <span id="sourceStatus" class="source-status">Excel wird geladen ...</span>
    <label class="file-label">
      Excel auswählen
      <input id="excelFile" class="hidden-file" type="file" accept=".xlsx,.xls" onchange="loadExcelFromFile(this.files[0])">
    </label>
  </div>

  <div class="toolbar">
    <select id="category" onchange="applyFilters()"></select>
    <input id="search" type="text" placeholder="Suche..." oninput="applyFilters()">
    <button onclick="exportProgress()">Export</button>
    <label class="toolbar-file-button">
      Import
      <input id="progressImportFile" class="hidden-file" type="file" accept=".json" onchange="importProgressFromFile(this.files[0])">
    </label>
    <button onclick="resetProgress()">Reset</button>
  </div>

  <div class="stats">
    <span id="score"></span>
  </div>

  <main class="card front" id="card" onclick="flipCard()">
    <div class="card-meta" id="cardMeta"></div>
    <div class="card-progress" id="cardProgress"></div>
    <div class="step-label" id="step"></div>
    <div class="ablauf-context" id="ablaufContext"></div>

    <div class="card-grid">
      <div class="card-half card-question">
        <div class="term question-text" id="questionText"></div>
      </div>
      <div class="card-divider"></div>
      <div class="card-half card-answer">
        <div class="term answer-text" id="answerText"></div>
      </div>
    </div>
  </main>

  <div class="controls">
    <button onclick="previousCard()">← Zurück</button>
    <button onclick="markAgain()">↑ Wiederholen</button>
    <button onclick="markGood()">↓ Gewusst</button>
    <button onclick="nextCard()">Weiter →</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="excel-loader.js"></script>
<script src="app.js"></script>

</body>
</html>
