<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAMED Statistik</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2d2d30;
  color: white;
}

.page {
  width: min(1300px, 96vw);
  margin: 0 auto;
  padding: 24px 0 36px;
}

a {
  color: #8abbd6;
  font-weight: bold;
}

.summary {
  margin: 24px 0;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.box {
  background: #19191b;
  padding: 12px 16px;
  border-radius: 14px;
  min-width: 160px;
}

.box strong {
  display: block;
  font-size: 24px;
  margin-top: 4px;
}

.source-row {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  margin: 18px 0;
}

.source-status {
  color: #d4d4d8;
  font-size: 15px;
}

.source-status.error {
  color: #fca5a5;
  font-weight: bold;
}

.file-label {
  display: inline-block;
  background: #74848b;
  color: #111827;
  padding: 10px 14px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.hidden-file {
  display: none;
}

input[type="text"] {
  width: min(360px, 100%);
  padding: 12px 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  margin-bottom: 16px;
  background: #c7c3ba;
  color: #1f2933;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #19191b;
}

th,
td {
  padding: 10px;
  border-bottom: 1px solid #3f3f46;
  text-align: left;
  vertical-align: top;
}

th {
  background: #2b2b2e;
  cursor: pointer;
  position: sticky;
  top: 0;
}

.num {
  text-align: right;
  white-space: nowrap;
}

.text-col {
  max-width: 360px;
}

.nominal-col {
  color: #93c5fd;
}

.patient-col {
  color: #fdba74;
}

.high {
  color: #f97316;
  font-weight: bold;
}

.low {
  color: #22c55e;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="page">

<h1>FAMED Flashcards Statistik</h1>
<a href="index.html">Zurück zu den Karten</a>

<div class="source-row">
  <span id="sourceStatus" class="source-status">Excel wird geladen ...</span>
  <label class="file-label">
    Excel auswählen
    <input id="excelFile" class="hidden-file" type="file" accept=".xlsx,.xls" onchange="loadStatsExcelFromFile(this.files[0])">
  </label>
</div>

<div class="summary">
  <div class="box">Karten<strong id="totalCards">0</strong></div>
  <div class="box">Gezeigt<strong id="totalShown">0</strong></div>
  <div class="box">Wiederholen<strong id="totalAgain">0</strong></div>
  <div class="box">Gewusst<strong id="totalGood">0</strong></div>
</div>

<input id="search" type="text" placeholder="Suche..." oninput="renderTable()">

<table>
<thead>
<tr>
  <th onclick="sortBy('penalty')">Strafpunkt</th>
  <th onclick="sortBy('category')">Eingriff</th>
  <th onclick="sortBy('step')">Schritt</th>
  <th onclick="sortBy('fachbegriff')">Nominalstil</th>
  <th onclick="sortBy('laiensprache')">Patientensprache</th>
  <th class="num" onclick="sortBy('shown')">Gezeigt</th>
  <th class="num" onclick="sortBy('again')">Wiederholen</th>
  <th class="num" onclick="sortBy('good')">Gewusst</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="excel-loader.js"></script>

<script>
const STORAGE_KEY = "flashcardProgressExcelV1";
const TURN_KEY = `${STORAGE_KEY}_studyTurn`;

let allCards = [];
const progress = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
const studyTurn = Number(localStorage.getItem(TURN_KEY)) || 0;

let sortColumn = "penalty";
let sortDirection = "desc";

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function setSourceStatus(text, isError = false) {
  const sourceStatus = document.getElementById("sourceStatus");
  sourceStatus.textContent = text;
  sourceStatus.className = isError ? "source-status error" : "source-status";
}

function getState(card) {
  const state = progress[card.id] || {};

  return {
    shown: Number(state.shown) || 0,
    again: Number(state.again) || 0,
    good: Number(state.good) || 0,
    penalty: Number(state.penalty) || 0,
    lastResult: state.lastResult || "new",
    lastSeenTurn: Number(state.lastSeenTurn) || 0,
    dueAfterTurn: Number(state.dueAfterTurn) || 0
  };
}

function getAnswerTotal(card) {
  const state = getState(card);
  return state.again + state.good;
}

function calculatePenalty(card) {
  const state = getState(card);
  const answerTotal = getAnswerTotal(card);
  const age = state.lastSeenTurn > 0
    ? Math.max(0, studyTurn - state.lastSeenTurn)
    : 0;

  const newBonus = answerTotal === 0 ? 2 : 0;
  const againPressure = state.again * 7;
  const goodReduction = state.good * 5;
  const exposureReduction = Math.min(state.shown * 1.4, 18);
  const ageBonus = Math.min(age * 0.65, 8);

  return newBonus + againPressure - goodReduction - exposureReduction + ageBonus;
}

function sortBy(column) {
  if (sortColumn === column) {
    sortDirection = sortDirection === "asc" ? "desc" : "asc";
  } else {
    sortColumn = column;
    sortDirection = "desc";
  }

  renderTable();
}

function getSortValue(card, column) {
  const state = getState(card);

  if (column === "category") return card.category;
  if (column === "step") return card.step;
  if (column === "fachbegriff") return card.fachbegriff;
  if (column === "laiensprache") return card.laiensprache;
  if (column === "shown") return state.shown;
  if (column === "again") return state.again;
  if (column === "good") return state.good;
  if (column === "penalty") return calculatePenalty(card);

  return "";
}

function renderSummary() {
  let totalShown = 0;
  let totalAgain = 0;
  let totalGood = 0;

  allCards.forEach(card => {
    const state = getState(card);
    totalShown += state.shown;
    totalAgain += state.again;
    totalGood += state.good;
  });

  document.getElementById("totalCards").textContent = allCards.length;
  document.getElementById("totalShown").textContent = totalShown;
  document.getElementById("totalAgain").textContent = totalAgain;
  document.getElementById("totalGood").textContent = totalGood;
}

function renderTable() {
  const searchTerm = document.getElementById("search").value.toLowerCase();

  let rows = allCards.filter(card => {
    const searchableText = [
      card.category,
      card.step,
      card.fachbegriff,
      card.laiensprache
    ].join(" ").toLowerCase();

    return searchableText.includes(searchTerm);
  });

  rows.sort((a, b) => {
    const valueA = getSortValue(a, sortColumn);
    const valueB = getSortValue(b, sortColumn);

    if (typeof valueA === "string") {
      return sortDirection === "asc"
        ? valueA.localeCompare(valueB)
        : valueB.localeCompare(valueA);
    }

    return sortDirection === "asc"
      ? valueA - valueB
      : valueB - valueA;
  });

  document.getElementById("tbody").innerHTML = rows.map(card => {
    const state = getState(card);
    const penalty = calculatePenalty(card);

    return `
      <tr>
        <td class="num ${penalty > 0 ? "high" : "low"}">${penalty.toFixed(1)}</td>
        <td>${escapeHtml(card.category)}</td>
        <td>${escapeHtml(card.step)}</td>
        <td class="text-col nominal-col">${escapeHtml(card.fachbegriff)}</td>
        <td class="text-col patient-col">${escapeHtml(card.laiensprache)}</td>
        <td class="num">${state.shown}</td>
        <td class="num">${state.again}</td>
        <td class="num">${state.good}</td>
      </tr>
    `;
  }).join("");

  renderSummary();
}

function setCards(cards, sourceLabel) {
  allCards = cards;
  renderTable();
  setSourceStatus(`${cards.length} Karten aus ${sourceLabel} geladen.`);
}

async function loadDefaultStatsExcel() {
  try {
    setSourceStatus("Lade Excel-Datei: ablauf.xlsx ...");
    const cards = await loadFlashcardsFromExcel(EXCEL_SOURCE);
    setCards(cards, "ablauf.xlsx");
  } catch (error) {
    setSourceStatus(
      "ablauf.xlsx konnte nicht automatisch geladen werden. Öffne die Seite über einen lokalen Server oder wähle die Excel-Datei manuell aus.",
      true
    );
    console.error(error);
    renderTable();
  }
}

async function loadStatsExcelFromFile(file) {
  try {
    if (!file) return;
    setSourceStatus(`Lade Excel-Datei: ${file.name} ...`);
    const cards = await loadFlashcardsFromExcelFile(file);
    setCards(cards, file.name);
  } catch (error) {
    setSourceStatus(error.message, true);
    console.error(error);
  }
}

document.addEventListener("DOMContentLoaded", loadDefaultStatsExcel);
</script>

</body>
</html>
